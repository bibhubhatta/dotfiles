[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
mouse_events   = ["click", "scroll"]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1000
max_height      = 1200
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
sixel_fraction  = 15
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
  { run = '${EDITOR:=nvim} "$@"', desc = "$EDITOR", block = true, for = "unix" },
]
open = [
  { run = 'xdg-open "$1"',              desc = "Open",            for = "linux" },
  { run = 'open "$1"',                  desc = "Open",            for = "macos" },
  { run = 'xdg-open "$1"',              desc = "Open",            for = "bsd"   },
]
reveal = [
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal",          for = "linux" },
  { run = 'open -R "$1"',               desc = "Reveal in Finder", for = "macos" },
  { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal",          for = "bsd"   },
  { run = '''exiftool "$1"; echo "Press enter to exit"; read _''', block = true, desc = "Show EXIF", for = "unix" },
]
extract = [
  { run = 'ya pub extract --list "$@"', desc = "Extract here", for = "unix" },
]
play = [
  { run = 'mpv --force-window "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
  { name = "*/", use = ["edit", "open", "reveal"] },

  { mime = "text/*",                 use = ["edit", "reveal"] },
  { mime = "image/*",                use = ["open", "reveal"] },
  { mime = "video/*",                use = ["play", "open", "reveal"] },
  { mime = "audio/*",                use = ["play", "open", "reveal"] },
  { mime = "inode/x-empty",          use = ["edit", "reveal"] },

  { mime = "application/json",       use = ["edit", "reveal"] },
  { mime = "*/javascript",           use = ["edit", "reveal"] },

  { mime = "application/zip",             use = ["extract", "reveal"] },
  { mime = "application/gzip",            use = ["extract", "reveal"] },
  { mime = "application/x-tar",           use = ["extract", "reveal"] },
  { mime = "application/x-bzip",          use = ["extract", "reveal"] },
  { mime = "application/x-bzip2",         use = ["extract", "reveal"] },
  { mime = "application/x-7z-compressed", use = ["extract", "reveal"] },
  { mime = "application/x-rar",           use = ["extract", "reveal"] },
  { mime = "application/xz",              use = ["extract", "reveal"] },

  { name = "*",                      use = ["open", "reveal"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 25
bizarre_retry    = 5
image_alloc      = 536870912  # 512 MB
image_bound      = [0, 0]
suppress_preload = false

[plugin]
prepend_previewers = [
  { name = "*.md",  run = "glow" },
  { mime = "text/markdown", run = "glow" },

  { mime = "application/x-executable",    run = "hexyl" },
  { mime = "application/x-pie-executable", run = "hexyl" },
  { mime = "application/x-sharedlib",     run = "hexyl" },
  { mime = "application/x-object",        run = "hexyl" },
  { mime = "application/x-archive",       run = "hexyl" },
  { mime = "application/octet-stream",    run = "hexyl" },
]

[input]
cursor_blink = false

[confirm]

[pick]

[which]
sort_by      = "none"
sort_sensitive = false
sort_reverse = false
