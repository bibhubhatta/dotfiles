# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors
# Format: monitor = [port], resolution, position, scale

# Optimized for retina-class 2x displays, like 13" 2.8K, 27" 5K, 32" 6K.
env = GDK_SCALE,1

monitor=desc:Samsung Electric Company LS24C33xG H9TX805473,1920x1080@60,0x0,1,vrr,1
monitor=desc:Samsung Electric Company LS24C33xG H9TX807112,1920x1080@60,1920x0,1,vrr,1
monitor=desc:Samsung Electric Company S24R35x H4TN800673,1920x1080@60,3840x0,1,vrr,1

# Workspace-to-monitor bindings
# Left monitor (LS24C33xG H9TX805473): workspaces 1-3
workspace = 1, monitor:desc:Samsung Electric Company LS24C33xG H9TX805473, default:true
workspace = 2, monitor:desc:Samsung Electric Company LS24C33xG H9TX805473
workspace = 3, monitor:desc:Samsung Electric Company LS24C33xG H9TX805473

# Center monitor (LS24C33xG H9TX807112): workspaces 4-6
workspace = 4, monitor:desc:Samsung Electric Company LS24C33xG H9TX807112, default:true
workspace = 5, monitor:desc:Samsung Electric Company LS24C33xG H9TX807112
workspace = 6, monitor:desc:Samsung Electric Company LS24C33xG H9TX807112

# Right monitor (S24R35x H4TN800673): workspaces 7-9
workspace = 7, monitor:desc:Samsung Electric Company S24R35x H4TN800673, default:true
workspace = 8, monitor:desc:Samsung Electric Company S24R35x H4TN800673
workspace = 9, monitor:desc:Samsung Electric Company S24R35x H4TN800673

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.6

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# Or for ultrawide monitors like 34" 3440x1440 or 49" 5120x1440
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Portrait/rotated secondary monitor (transform: 1 = 90°, 3 = 270°)
# monitor = DP-2, preferred, auto, 1, transform, 1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2
